name: ZXP Release

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run type check
        run: npx tsc -p tsconfig-build.json

      - name: Run unit tests
        run: npm test

      - name: Build and Package Extension (ZXP & ZIP)
        run: npm run zip

      - name: Create Raw Folder Zip (Manual Installation)
        run: |
          cd dist/cep
          zip -r ../../com.tripo4ae.panel.zip .
          cd ../..

      - name: Upload Packaged Artifacts (GitHub Actions UI)
        uses: actions/upload-artifact@v4
        with:
          name: tripo4ae-extension
          path: |
            dist/zxp/com.tripo4ae.panel.zxp
            dist/zip/Tripo4AE_*.zip
            com.tripo4ae.panel.zip
          if-no-files-found: error

      - name: Generate latest.json for rate-limit-free updates
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "{\"version\": \"${{ github.ref_name }}\", \"commit\": \"${{ github.sha }}\", \"url\": \"https://github.com/hexxyan/tripo4ae/releases/tag/${{ github.ref_name }}\", \"notes\": \"See release details at: https://github.com/hexxyan/tripo4ae/releases/tag/${{ github.ref_name }}\"}" > latest.json

      - name: GitHub Release (On Tag Push)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            dist/zxp/com.tripo4ae.panel.zxp
            dist/zip/Tripo4AE_*.zip
            com.tripo4ae.panel.zip
            latest.json
          draft: false
          prerelease: false
          generate_release_notes: true
